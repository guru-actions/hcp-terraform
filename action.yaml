apiVersion: automation.cloudbees.io/v1alpha1
kind: action
name: hcp-terraform
description: Execute Terraform operations via HCP Terraform (stub and live modes)

inputs:
  environment:
    description: Target environment (e.g., dev, prod)
    required: true
  operation:
    description: 'Terraform operation: plan | apply | drift'
    required: true
  workspace:
    description: HCP Terraform workspace name
    required: true
  stub_mode:
    description: Run in stub mode (true) or live mode (false)
    required: false
    default: 'true'

outputs:
  run_id:
    description: HCP Terraform run ID
    value: ${{ steps.run.outputs.run_id }}
  run_url:
    description: URL to the HCP Terraform run
    value: ${{ steps.run.outputs.run_url }}
  status:
    description: Run status (planned, applied, drifted)
    value: ${{ steps.run.outputs.status }}
  summary_json:
    description: Terraform plan summary as JSON string
    value: ${{ steps.run.outputs.summary_json }}

runs:
  using: composite
  steps:
    - id: run
      name: Execute HCP Terraform Operation
      uses: docker://alpine:3.20
      shell: sh
      env:
        ENVIRONMENT: ${{ inputs.environment }}
        OPERATION: ${{ inputs.operation }}
        WORKSPACE: ${{ inputs.workspace }}
        STUB_MODE: ${{ inputs.stub_mode }}
      run: |
        set -e

        if [ "${STUB_MODE}" = "true" ]; then
          # Generate realistic run ID with Alpine-safe randomness
          RAND="$(hexdump -n 8 -e '8/1 "%02x"' /dev/urandom 2>/dev/null || date +%N)"
          RUN_ID="run-$(date +%s)-${RAND}"

          # Generate HCP Terraform-style URL
          RUN_URL="https://app.terraform.io/app/demo-org/workspaces/${WORKSPACE}/runs/${RUN_ID}"

          # Determine status based on operation
          case "${OPERATION}" in
            plan)
              STATUS="planned"
              ;;
            apply)
              STATUS="applied"
              ;;
            drift)
              STATUS="drifted"
              ;;
            *)
              STATUS="planned"
              ;;
          esac

          # Generate Terraform plan summary JSON (single line, valid JSON)
          SUMMARY_JSON="{\"add\":1,\"change\":0,\"destroy\":0,\"operation\":\"${OPERATION}\",\"environment\":\"${ENVIRONMENT}\"}"

          # Write outputs to CloudBees output files
          printf '%s' "${RUN_ID}" > "$CLOUDBEES_OUTPUTS/run_id"
          printf '%s' "${RUN_URL}" > "$CLOUDBEES_OUTPUTS/run_url"
          printf '%s' "${STATUS}" > "$CLOUDBEES_OUTPUTS/status"
          printf '%s' "${SUMMARY_JSON}" > "$CLOUDBEES_OUTPUTS/summary_json"

          # Log for visibility
          echo "✓ Stub mode executed successfully"
          echo "  Run ID: ${RUN_ID}"
          echo "  Status: ${STATUS}"
          echo "  URL: ${RUN_URL}"
          echo "  Summary: ${SUMMARY_JSON}"
        else
          echo "Live mode not implemented yet"
          exit 1
        fi
