apiVersion: automation.cloudbees.io/v1alpha1
kind: action
name: hcp-terraform
description: Execute Terraform operations via HCP Terraform (stub and live modes)

inputs:
  environment:
    description: Target environment (e.g., dev, prod)
    required: true
  operation:
    description: 'Terraform operation: plan | apply | drift'
    required: true
  workspace:
    description: HCP Terraform workspace name
    required: true
  stub_mode:
    description: Run in stub mode (true) or live mode (false)
    required: false
    default: 'true'
  vcs_repo:
    description: VCS repository (e.g., org/repo)
    required: true
  vcs_branch:
    description: VCS branch name
    required: true
  vcs_path:
    description: Path to Terraform configuration in repo
    required: false
    default: 'terraform/'
  commit_sha:
    description: Git commit SHA (optional, will be generated if not provided)
    required: false
  opa_status:
    description: OPA policy check status (optional, for enriching outputs)
    required: false
  monthly_cost:
    description: Infracost monthly cost estimate (optional, for enriching outputs)
    required: false
  tfc_org:
    description: Terraform Cloud organization name (required when stub_mode=false)
    required: false
  tfc_token:
    description: Terraform Cloud API token (required when stub_mode=false)
    required: false
  tfc_api_base_url:
    description: Terraform Cloud API base URL
    required: false
    default: 'https://app.terraform.io/api/v2'
  poll_interval_seconds:
    description: Polling interval in seconds for run status
    required: false
    default: '5'
  poll_timeout_seconds:
    description: Maximum time in seconds to wait for run completion
    required: false
    default: '600'

outputs:
  run_id:
    description: HCP Terraform run ID
    value: ${{ steps.run.outputs.run_id }}
  run_url:
    description: URL to the HCP Terraform run
    value: ${{ steps.run.outputs.run_url }}
  status:
    description: Run status (planned, applied, drifted)
    value: ${{ steps.run.outputs.status }}
  summary_json:
    description: Terraform plan summary as JSON string
    value: ${{ steps.run.outputs.summary_json }}
  workspace_name:
    description: Terraform Cloud workspace name
    value: ${{ steps.run.outputs.workspace_name }}
  run_status:
    description: Detailed run status
    value: ${{ steps.run.outputs.run_status }}
  vcs_repo:
    description: VCS repository
    value: ${{ steps.run.outputs.vcs_repo }}
  vcs_branch:
    description: VCS branch
    value: ${{ steps.run.outputs.vcs_branch }}
  vcs_commit_sha:
    description: VCS commit SHA
    value: ${{ steps.run.outputs.vcs_commit_sha }}
  tfc_org:
    description: Terraform Cloud organization
    value: ${{ steps.run.outputs.tfc_org }}

runs:
  using: composite
  steps:
    - id: run
      name: Execute HCP Terraform Operation
      uses: docker://alpine:3.20
      shell: sh
      env:
        ENVIRONMENT: ${{ inputs.environment }}
        OPERATION: ${{ inputs.operation }}
        WORKSPACE: ${{ inputs.workspace }}
        STUB_MODE: ${{ inputs.stub_mode }}
        VCS_REPO: ${{ inputs.vcs_repo }}
        VCS_BRANCH: ${{ inputs.vcs_branch }}
        VCS_PATH: ${{ inputs.vcs_path }}
        COMMIT_SHA: ${{ inputs.commit_sha }}
        OPA_STATUS: ${{ inputs.opa_status }}
        MONTHLY_COST: ${{ inputs.monthly_cost }}
        TFC_ORG: ${{ inputs.tfc_org }}
        TFC_TOKEN: ${{ inputs.tfc_token }}
        TFC_API_BASE_URL: ${{ inputs.tfc_api_base_url }}
        POLL_INTERVAL_SECONDS: ${{ inputs.poll_interval_seconds }}
        POLL_TIMEOUT_SECONDS: ${{ inputs.poll_timeout_seconds }}
      run: |
        set -e

        if [ "${STUB_MODE}" = "true" ]; then
          # Generate Terraform Cloud org and workspace
          TFC_ORG="demo-org"
          WORKSPACE_NAME="${WORKSPACE}"

          # Generate or use commit SHA
          if [ -n "${COMMIT_SHA}" ]; then
            VCS_COMMIT_SHA="${COMMIT_SHA}"
          else
            # Generate fake 8-char hex SHA
            VCS_COMMIT_SHA="$(hexdump -n 4 -e '4/1 "%02x"' /dev/urandom 2>/dev/null || printf '%08x' $(($(date +%s) % 4294967296)))"
          fi

          echo "=== HCP Terraform VCS-Connected Workspace Run ==="
          echo "Organization: ${TFC_ORG}"
          echo "Workspace: ${WORKSPACE_NAME}"
          echo "VCS Repo: ${VCS_REPO}"
          echo "VCS Branch: ${VCS_BRANCH}"
          echo "VCS Path: ${VCS_PATH}"
          echo "Commit SHA: ${VCS_COMMIT_SHA}"
          echo "Operation: ${OPERATION}"
          echo ""

          # Simulate realistic run lifecycle
          echo "⏳ Run queued..."
          sleep 1
          echo "📋 Run planning..."
          sleep 1

          # Determine final status based on operation
          case "${OPERATION}" in
            plan)
              STATUS="planned"
              RUN_STATUS="Plan finished"
              ;;
            apply)
              STATUS="applied"
              RUN_STATUS="Apply finished"
              ;;
            drift)
              STATUS="drifted"
              RUN_STATUS="Drift detected"
              ;;
            *)
              STATUS="planned"
              RUN_STATUS="Plan finished"
              ;;
          esac

          echo "✅ ${RUN_STATUS}"
          echo ""

          # Generate realistic run ID with Alpine-safe randomness
          RAND="$(hexdump -n 8 -e '8/1 "%02x"' /dev/urandom 2>/dev/null || date +%N)"
          RUN_ID="run-$(date +%s)-${RAND}"

          # Generate HCP Terraform-style URL
          RUN_URL="https://app.terraform.io/app/${TFC_ORG}/workspaces/${WORKSPACE_NAME}/runs/${RUN_ID}"

          # Build summary JSON with optional governance fields
          SUMMARY_JSON="{\"add\":1,\"change\":0,\"destroy\":0,\"operation\":\"${OPERATION}\",\"environment\":\"${ENVIRONMENT}\",\"vcs_repo\":\"${VCS_REPO}\",\"vcs_branch\":\"${VCS_BRANCH}\",\"commit_sha\":\"${VCS_COMMIT_SHA}\""

          # Add optional OPA status if provided
          if [ -n "${OPA_STATUS}" ]; then
            SUMMARY_JSON="${SUMMARY_JSON},\"opa_status\":\"${OPA_STATUS}\""
          fi

          # Add optional monthly cost if provided
          if [ -n "${MONTHLY_COST}" ]; then
            SUMMARY_JSON="${SUMMARY_JSON},\"monthly_cost\":\"${MONTHLY_COST}\""
          fi

          SUMMARY_JSON="${SUMMARY_JSON}}"

          # Write all outputs to CloudBees output files
          printf '%s' "${RUN_ID}" > "$CLOUDBEES_OUTPUTS/run_id"
          printf '%s' "${RUN_URL}" > "$CLOUDBEES_OUTPUTS/run_url"
          printf '%s' "${STATUS}" > "$CLOUDBEES_OUTPUTS/status"
          printf '%s' "${SUMMARY_JSON}" > "$CLOUDBEES_OUTPUTS/summary_json"
          printf '%s' "${WORKSPACE_NAME}" > "$CLOUDBEES_OUTPUTS/workspace_name"
          printf '%s' "${RUN_STATUS}" > "$CLOUDBEES_OUTPUTS/run_status"
          printf '%s' "${VCS_REPO}" > "$CLOUDBEES_OUTPUTS/vcs_repo"
          printf '%s' "${VCS_BRANCH}" > "$CLOUDBEES_OUTPUTS/vcs_branch"
          printf '%s' "${VCS_COMMIT_SHA}" > "$CLOUDBEES_OUTPUTS/vcs_commit_sha"
          printf '%s' "${TFC_ORG}" > "$CLOUDBEES_OUTPUTS/tfc_org"

          # Log summary
          echo "=== Run Summary ==="
          echo "Run ID: ${RUN_ID}"
          echo "Status: ${STATUS}"
          echo "Run URL: ${RUN_URL}"
          echo ""
        else
          # ============================================================
          # Live Mode: Real HCP Terraform API Integration
          # ============================================================

          echo "=== HCP Terraform Live Mode ==="
          echo ""

          # Install required tools
          apk add --no-cache curl jq

          # Validate required inputs for live mode
          if [ -z "${TFC_TOKEN}" ]; then
            echo "❌ ERROR: tfc_token is required when stub_mode=false"
            exit 1
          fi

          if [ -z "${TFC_ORG}" ]; then
            echo "❌ ERROR: tfc_org is required when stub_mode=false"
            exit 1
          fi

          if [ -z "${WORKSPACE}" ]; then
            echo "❌ ERROR: workspace is required when stub_mode=false"
            exit 1
          fi

          # Use provided or default values
          API_BASE_URL="${TFC_API_BASE_URL:-https://app.terraform.io/api/v2}"
          POLL_INTERVAL="${POLL_INTERVAL_SECONDS:-5}"
          POLL_TIMEOUT="${POLL_TIMEOUT_SECONDS:-600}"

          # Generate or use commit SHA
          if [ -n "${COMMIT_SHA}" ]; then
            VCS_COMMIT_SHA="${COMMIT_SHA}"
          else
            VCS_COMMIT_SHA="$(hexdump -n 4 -e '4/1 "%02x"' /dev/urandom 2>/dev/null || printf '%08x' $(($(date +%s) % 4294967296)))"
          fi

          echo "Organization: ${TFC_ORG}"
          echo "Workspace: ${WORKSPACE}"
          echo "API Base URL: ${API_BASE_URL}"
          echo ""

          # ============================================================
          # A) Lookup Workspace ID
          # ============================================================

          echo "🔍 Looking up workspace..."

          WORKSPACE_RESPONSE=$(curl -s -f \
            -H "Authorization: Bearer ${TFC_TOKEN}" \
            -H "Content-Type: application/vnd.api+json" \
            "${API_BASE_URL}/organizations/${TFC_ORG}/workspaces/${WORKSPACE}")

          if [ $? -ne 0 ]; then
            echo "❌ ERROR: Failed to lookup workspace '${WORKSPACE}' in organization '${TFC_ORG}'"
            echo "Verify that:"
            echo "  - Organization name is correct"
            echo "  - Workspace exists"
            echo "  - API token has permissions"
            exit 1
          fi

          WORKSPACE_ID=$(echo "${WORKSPACE_RESPONSE}" | jq -r '.data.id')

          if [ -z "${WORKSPACE_ID}" ] || [ "${WORKSPACE_ID}" = "null" ]; then
            echo "❌ ERROR: Could not extract workspace ID from response"
            exit 1
          fi

          echo "✅ Workspace ID: ${WORKSPACE_ID}"
          echo ""

          # ============================================================
          # B) Create Run
          # ============================================================

          echo "🚀 Creating run..."

          # Determine if this is a plan-only run
          if [ "${OPERATION}" = "plan" ]; then
            IS_PLAN_ONLY="true"
            RUN_MESSAGE="CloudBees Unify: plan (${ENVIRONMENT}) ${VCS_REPO}@${VCS_BRANCH} ${VCS_COMMIT_SHA}"
          else
            IS_PLAN_ONLY="false"
            RUN_MESSAGE="CloudBees Unify: ${OPERATION} (${ENVIRONMENT}) ${VCS_REPO}@${VCS_BRANCH} ${VCS_COMMIT_SHA}"
          fi

          # Build JSON:API payload for creating a run
          CREATE_RUN_PAYLOAD=$(cat <<EOF
{
  "data": {
    "type": "runs",
    "attributes": {
      "message": "${RUN_MESSAGE}",
      "is-destroy": false,
      "plan-only": ${IS_PLAN_ONLY}
    },
    "relationships": {
      "workspace": {
        "data": {
          "type": "workspaces",
          "id": "${WORKSPACE_ID}"
        }
      }
    }
  }
}
EOF
)

          CREATE_RUN_RESPONSE=$(curl -s -f \
            -X POST \
            -H "Authorization: Bearer ${TFC_TOKEN}" \
            -H "Content-Type: application/vnd.api+json" \
            -d "${CREATE_RUN_PAYLOAD}" \
            "${API_BASE_URL}/runs")

          if [ $? -ne 0 ]; then
            echo "❌ ERROR: Failed to create run"
            exit 1
          fi

          RUN_ID=$(echo "${CREATE_RUN_RESPONSE}" | jq -r '.data.id')

          if [ -z "${RUN_ID}" ] || [ "${RUN_ID}" = "null" ]; then
            echo "❌ ERROR: Could not extract run ID from response"
            exit 1
          fi

          # Construct run URL
          RUN_URL="https://app.terraform.io/app/${TFC_ORG}/workspaces/${WORKSPACE}/runs/${RUN_ID}"

          echo "✅ Run created: ${RUN_ID}"
          echo "🔗 Run URL: ${RUN_URL}"
          echo ""

          # ============================================================
          # C) Poll Run Status
          # ============================================================

          echo "⏳ Polling run status..."
          echo ""

          START_TIME=$(date +%s)
          CURRENT_STATUS=""

          while true; do
            # Get run status
            RUN_STATUS_RESPONSE=$(curl -s -f \
              -H "Authorization: Bearer ${TFC_TOKEN}" \
              -H "Content-Type: application/vnd.api+json" \
              "${API_BASE_URL}/runs/${RUN_ID}")

            if [ $? -ne 0 ]; then
              echo "❌ ERROR: Failed to poll run status"
              exit 1
            fi

            CURRENT_STATUS=$(echo "${RUN_STATUS_RESPONSE}" | jq -r '.data.attributes.status')

            echo "Status: ${CURRENT_STATUS}"

            # Check for terminal states
            case "${CURRENT_STATUS}" in
              planned|planned_and_finished)
                if [ "${OPERATION}" = "plan" ]; then
                  echo ""
                  echo "✅ Plan completed successfully"
                  STATUS="planned"
                  RUN_STATUS="Plan finished"
                  break
                else
                  # For apply operations, we need to continue and apply
                  echo "Plan phase completed, ready to apply"
                  break
                fi
                ;;
              applied)
                echo ""
                echo "✅ Apply completed successfully"
                STATUS="applied"
                RUN_STATUS="Apply finished"
                break
                ;;
              errored|canceled|force_canceled)
                echo ""
                echo "❌ ERROR: Run failed with status: ${CURRENT_STATUS}"
                exit 1
                ;;
              discarded)
                echo ""
                echo "❌ ERROR: Run was discarded"
                exit 1
                ;;
            esac

            # Check timeout
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))

            if [ ${ELAPSED} -ge ${POLL_TIMEOUT} ]; then
              echo ""
              echo "❌ ERROR: Polling timeout (${POLL_TIMEOUT}s) exceeded"
              exit 1
            fi

            # Wait before next poll
            sleep ${POLL_INTERVAL}
          done

          # ============================================================
          # D) Apply Action (only if operation=apply)
          # ============================================================

          if [ "${OPERATION}" = "apply" ] && [ "${STATUS}" != "applied" ]; then
            echo ""
            echo "🚀 Applying run..."

            APPLY_RESPONSE=$(curl -s -f \
              -X POST \
              -H "Authorization: Bearer ${TFC_TOKEN}" \
              -H "Content-Type: application/vnd.api+json" \
              "${API_BASE_URL}/runs/${RUN_ID}/actions/apply")

            if [ $? -ne 0 ]; then
              echo "❌ ERROR: Failed to apply run"
              exit 1
            fi

            echo "✅ Apply action triggered"
            echo ""

            # Continue polling until applied
            echo "⏳ Waiting for apply to complete..."
            echo ""

            while true; do
              RUN_STATUS_RESPONSE=$(curl -s -f \
                -H "Authorization: Bearer ${TFC_TOKEN}" \
                -H "Content-Type: application/vnd.api+json" \
                "${API_BASE_URL}/runs/${RUN_ID}")

              if [ $? -ne 0 ]; then
                echo "❌ ERROR: Failed to poll run status"
                exit 1
              fi

              CURRENT_STATUS=$(echo "${RUN_STATUS_RESPONSE}" | jq -r '.data.attributes.status')

              echo "Status: ${CURRENT_STATUS}"

              case "${CURRENT_STATUS}" in
                applied)
                  echo ""
                  echo "✅ Apply completed successfully"
                  STATUS="applied"
                  RUN_STATUS="Apply finished"
                  break
                  ;;
                errored|canceled|force_canceled|discarded)
                  echo ""
                  echo "❌ ERROR: Run failed with status: ${CURRENT_STATUS}"
                  exit 1
                  ;;
              esac

              # Check timeout
              CURRENT_TIME=$(date +%s)
              ELAPSED=$((CURRENT_TIME - START_TIME))

              if [ ${ELAPSED} -ge ${POLL_TIMEOUT} ]; then
                echo ""
                echo "❌ ERROR: Polling timeout (${POLL_TIMEOUT}s) exceeded"
                exit 1
              fi

              sleep ${POLL_INTERVAL}
            done
          fi

          echo ""
          echo "=== Run Summary ==="
          echo "Run ID: ${RUN_ID}"
          echo "Status: ${STATUS}"
          echo "Run URL: ${RUN_URL}"
          echo ""

          # ============================================================
          # Build Output Summary JSON
          # ============================================================

          # Build summary JSON with optional governance fields
          SUMMARY_JSON="{\"operation\":\"${OPERATION}\",\"environment\":\"${ENVIRONMENT}\",\"vcs_repo\":\"${VCS_REPO}\",\"vcs_branch\":\"${VCS_BRANCH}\",\"commit_sha\":\"${VCS_COMMIT_SHA}\""

          # Add optional OPA status if provided
          if [ -n "${OPA_STATUS}" ]; then
            SUMMARY_JSON="${SUMMARY_JSON},\"opa_status\":\"${OPA_STATUS}\""
          fi

          # Add optional monthly cost if provided
          if [ -n "${MONTHLY_COST}" ]; then
            SUMMARY_JSON="${SUMMARY_JSON},\"monthly_cost\":\"${MONTHLY_COST}\""
          fi

          SUMMARY_JSON="${SUMMARY_JSON}}"

          # ============================================================
          # Write Outputs (same contract as stub mode)
          # ============================================================

          printf '%s' "${RUN_ID}" > "$CLOUDBEES_OUTPUTS/run_id"
          printf '%s' "${RUN_URL}" > "$CLOUDBEES_OUTPUTS/run_url"
          printf '%s' "${STATUS}" > "$CLOUDBEES_OUTPUTS/status"
          printf '%s' "${SUMMARY_JSON}" > "$CLOUDBEES_OUTPUTS/summary_json"
          printf '%s' "${WORKSPACE}" > "$CLOUDBEES_OUTPUTS/workspace_name"
          printf '%s' "${RUN_STATUS}" > "$CLOUDBEES_OUTPUTS/run_status"
          printf '%s' "${VCS_REPO}" > "$CLOUDBEES_OUTPUTS/vcs_repo"
          printf '%s' "${VCS_BRANCH}" > "$CLOUDBEES_OUTPUTS/vcs_branch"
          printf '%s' "${VCS_COMMIT_SHA}" > "$CLOUDBEES_OUTPUTS/vcs_commit_sha"
          printf '%s' "${TFC_ORG}" > "$CLOUDBEES_OUTPUTS/tfc_org"
        fi
